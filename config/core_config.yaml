# Which interfaces to run:
interfaces:
  speaker: true
  voice_local: false
  web: true
  asterisk: true

ollama:
  host: "http://localhost:11434"
  model: "qwen3.5:9b"
  model_type: "qwen3"   # drives message formatting: "gemma", "qwen3" etc.
  num_ctx: 16384      # context window size - affects memory footprint, decrease if memory constrained, has effect on how much conversation history can be sent to the model

# Which backend to use for LLM calls: "ollama" or "llama_server"
backend: "ollama"

llama_server:
  host: "http://localhost:8080"   # llama-server's base URL — don't include /v1, that's added automatically
  model: "default"                # most llama-server builds ignore this, but the OpenAI-compatible API requires a value
  use_slots:     true             # ensure llama-server is launched with --parallel 2 so we can be aggressive with kv cache management for better performance
  slot_main:     0
  slot_headless: 1

server:
  remote_voice_host: "0.0.0.0"
  remote_voice_port: 10400

# asterisk phone link - for phone connection to voice agent
asterisk:
  ari_host: "127.0.0.1"        # leave as-is (Asterisk is local)
  ari_port: 8088               # leave as-is unless you changed http.conf
  ari_user: "supernova"        # must match [supernova] section name in ari.conf
  ari_password: "supernovaaccess" # must match password in ari.conf - yes this is a password set in github, but access is restricted in asterisk to localhost connections only so it's low risk
  rtp_local_ip: "127.0.0.1"   # leave as-is (RTP stays local on Jetson)

# this section is so you can debug and take recordings on voice inputs for enrolling voices etc
debug:                        
  record_audio: false
  record_dir: "./debug_audio"
  verbose: true
  log_prompts: false
  log_prompts_dir: "./debug_prompts"

voice:
  model_path: "./libs/voices/glados_piper_medium.onnx"
  use_cuda: false

speaker_id:
  threshold: 0.5  # threshold to pass for positive speaker ID (only for Asterisk interface as it struggles with bad phone audio)